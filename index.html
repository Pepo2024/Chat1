<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro</title>
    <style>
        /* التنسيقات الأساسية */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif; background-color: #efeae2; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* الهيدر */
        .header { background-color: #f0f2f5; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.1); z-index: 10; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 40px; height: 40px; background: #008069; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .status { font-size: 12px; color: #667781; }

        /* منطقة الدردشة */
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay; background-color: #efeae2; }

        /* الفقاعات */
        .bubble { max-width: 80%; padding: 8px 12px; font-size: 14.5px; position: relative; border-radius: 8px; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); cursor: pointer; line-height: 1.4; }
        .bubble-out { background-color: #d9fdd3; align-self: flex-end; }
        .bubble-in { background-color: #ffffff; align-self: flex-start; }
        .time { font-size: 10px; color: #667781; margin-top: 4px; text-align: left; }

        /* منطقة الإدخال */
        .input-area { background-color: #f0f2f5; padding: 8px 16px; display: flex; align-items: center; gap: 8px; }
        .input-box { flex: 1; background: white; border-radius: 20px; padding: 8px 15px; border: none; outline: none; font-size: 15px; min-height: 40px; max-height: 100px; overflow-y: auto; }
        .send-btn { background-color: #008069; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* قائمة المسح */
        .menu-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #54656f; }
        .clear-btn { background: #ff5e5e; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <div class="avatar">CR</div>
            <div>
                <div style="font-weight: 600; font-size: 15px;">غرفة الدردشة</div>
                <div class="status">متصل الآن</div>
            </div>
        </div>
        <button id="clear-all-btn" class="clear-btn">مسح الكل</button>
    </div>

    <div id="chat-container" class="chat-container"></div>

    <div class="input-area">
        <input id="message-input" type="text" class="input-box" placeholder="اكتب رسالة">
        <button id="send-btn" class="send-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, onChildRemoved, remove, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD03Kn97hVqwGmizWO3mWdh_fYaRAJ0OdQ",
            authDomain: "chat1-e8742.firebaseapp.com",
            databaseURL: "https://chat1-e8742-default-rtdb.firebaseio.com",
            projectId: "chat1-e8742",
            storageBucket: "chat1-e8742.firebasestorage.app",
            messagingSenderId: "857146526059",
            appId: "1:857146526059:web:1a2b79c8eea8e12c6b242e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');
        const myUserId = "user_" + Math.floor(Math.random() * 9999);

        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const clearAllBtn = document.getElementById('clear-all-btn');

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (text !== "") {
                const newMessageRef = push(messagesRef);
                await set(newMessageRef, { userId: myUserId, text: text, timestamp: serverTimestamp() });
                messageInput.value = "";
                messageInput.focus();
            }
        }

        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        clearAllBtn.onclick = () => { if(confirm("مسح الكل؟")) remove(messagesRef); };

        onChildAdded(messagesRef, (snapshot) => {
            const data = snapshot.val();
            const id = snapshot.key;
            const isMe = data.userId === myUserId;
            const time = data.timestamp ? new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
            
            const msgDiv = document.createElement('div');
            msgDiv.id = `msg-${id}`;
            msgDiv.className = `bubble ${isMe ? 'bubble-out' : 'bubble-in'}`;
            msgDiv.innerHTML = `<div>${data.text}</div><div class="time">${time}</div>`;
            
            msgDiv.onclick = () => { if(confirm("حذف؟")) remove(ref(db, `messages/${id}`)); };
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });

        onChildRemoved(messagesRef, (snapshot) => {
            const el = document.getElementById(`msg-${snapshot.key}`);
            if(el) el.remove();
        });
    </script>
</body>
</html>
