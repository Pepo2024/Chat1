<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
      font-family: 'Cairo', Arial, sans-serif;
      background: #121212;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container, .chat-container {
      width: 100%;
      max-width: 480px;
      margin: auto;
    }
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .login-form {
      background: #1f1f1f;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      width: 100%;
    }
    .login-form h2 {
      margin: 0 0 1rem 0;
      color: #4dabf7;
      text-align: center;
    }
    .login-form input[type="text"] {
      padding: 0.7rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      background: #2a2a2a;
      color: #fff;
    }
    .gender-select {
      display: flex;
      justify-content: center;
      gap: 2rem;
    }
    .gender-select label {
      font-size: 1rem;
      color: #ccc;
      cursor: pointer;
    }
    .login-form button {
      padding: 0.8rem;
      background: #4dabf7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-form button:hover {
      background: #1a73e8;
    }
    .chat-container {
      display: none;
      flex-direction: column;
      height: 100vh;
      background: #1f1f1f;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .chat-header {
      background: #2c2c2c;
      color: #fff;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.1rem;
    }
    .logout-btn {
      background: #ff4d4f;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.4rem 1rem;
      cursor: pointer;
    }
    .messages-list {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      background: #121212;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .message {
      background: #2a2a2a;
      border-radius: 10px;
      padding: 0.6rem 0.9rem;
      color: #fff;
      max-width: 80%;
      word-break: break-word;
    }
    .message.own {
      background: #0d6efd;
      align-self: flex-end;
    }
    .msg-header {
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
      opacity: 0.8;
    }
    .send-form {
      display: flex;
      gap: 0.4rem;
      padding: 0.8rem;
      background: #2c2c2c;
      align-items: center;
    }
    .send-form input[type="text"] {
      flex: 1;
      padding: 0.6rem;
      border: none;
      border-radius: 8px;
      background: #3a3a3a;
      color: #fff;
      outline: none;
    }
    .send-form button {
      background: #4dabf7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      cursor: pointer;
    }
    .send-form button:hover {
      background: #1a73e8;
    }
    .send-form input[type="file"] {
      display: none;
    }
    .icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      color: #4dabf7;
    }
  </style>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
</head>
<body>
  <div id="login" class="login-container">
    <form class="login-form" id="loginForm">
      <h2>تسجيل الدخول</h2>
      <input type="text" id="nameInput" placeholder="اكتب اسمك..." required />
      <div class="gender-select">
        <label><input type="radio" name="gender" value="male" checked /> ذكر</label>
        <label><input type="radio" name="gender" value="female" /> أنثى</label>
      </div>
      <button type="submit">دخول</button>
    </form>
  </div>

  <div id="chat" class="chat-container">
    <div class="chat-header">
      <span>غرفة الشات الجماعي</span>
      <button class="logout-btn" id="logoutBtn">خروج</button>
    </div>
    <div class="messages-list" id="messagesList"></div>
    <form class="send-form" id="sendForm">
      <button type="button" class="icon-btn" id="imgBtn">📷</button>
      <input type="file" id="imgInput" accept="image/*" />
      <button type="button" class="icon-btn" id="voiceBtn">🎤</button>
      <input type="text" id="msgInput" placeholder="اكتب رسالتك..." autocomplete="off" />
      <button type="submit">إرسال</button>
    </form>
  </div>

  <script>
    // Firebase config الجديد
    const firebaseConfig = { 
      apiKey: "AIzaSyD03Kn97hVqwGmizWO3mWdh_fYaRAJ0OdQ",
      authDomain: "chat1-e8742.firebaseapp.com",
      databaseURL: "https://chat1-e8742-default-rtdb.firebaseio.com",
      projectId: "chat1-e8742",
      storageBucket: "chat1-e8742.appspot.com",
      messagingSenderId: "857146526059",
      appId: "1:857146526059:web:1a2b79c8eea8e12c6b242e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    const messagesRef = db.ref('messages');

    const loginDiv = document.getElementById('login');
    const chatDiv = document.getElementById('chat');
    const loginForm = document.getElementById('loginForm');
    const nameInput = document.getElementById('nameInput');
    const sendForm = document.getElementById('sendForm');
    const msgInput = document.getElementById('msgInput');
    const messagesList = document.getElementById('messagesList');
    const logoutBtn = document.getElementById('logoutBtn');
    const imgBtn = document.getElementById('imgBtn');
    const imgInput = document.getElementById('imgInput');
    const voiceBtn = document.getElementById('voiceBtn');

    let currentUser = null;
    let mediaRecorder;
    let audioChunks = [];

    loginForm.onsubmit = (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();
      const gender = loginForm.gender.value;
      if(name){
        currentUser = { name, gender };
        loginDiv.style.display = 'none';
        chatDiv.style.display = 'flex';
        loadMessages();
      }
    };

    logoutBtn.onclick = () => {
      chatDiv.style.display = 'none';
      loginDiv.style.display = 'flex';
      messagesList.innerHTML = '';
      msgInput.value = '';
      currentUser = null;
    };

    sendForm.onsubmit = (e) => {
      e.preventDefault();
      const text = msgInput.value.trim();
      if(text && currentUser){
        messagesRef.push({
          name: currentUser.name,
          gender: currentUser.gender,
          text,
          timestamp: Date.now()
        });
        msgInput.value = '';
      }
    };

    imgBtn.onclick = () => imgInput.click();
    imgInput.onchange = (e) => {
      const file = e.target.files[0];
      if(file){
        const ref = storage.ref('images/' + Date.now() + '-' + file.name);
        ref.put(file).then(() => ref.getDownloadURL()).then(url => {
          messagesRef.push({
            name: currentUser.name,
            gender: currentUser.gender,
            image: url,
            timestamp: Date.now()
          });
        });
      }
    };

    voiceBtn.onclick = async () => {
      if(mediaRecorder && mediaRecorder.state === "recording"){
        mediaRecorder.stop();
        voiceBtn.textContent = '🎤';
      } else {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const file = new File([blob], Date.now()+'.webm');
          const ref = storage.ref('voices/' + file.name);
          ref.put(file).then(() => ref.getDownloadURL()).then(url => {
            messagesRef.push({
              name: currentUser.name,
              gender: currentUser.gender,
              voice: url,
              timestamp: Date.now()
            });
          });
        };
        mediaRecorder.start();
        voiceBtn.textContent = '⏹️';
      }
    };

    function loadMessages(){
      messagesRef.off();
      messagesRef.on('value', snap => {
        const data = snap.val() || {};
        const msgs = Object.entries(data).map(([id, msg]) => ({id, ...msg}));
        msgs.sort((a,b) => (a.timestamp||0)-(b.timestamp||0));
        renderMessages(msgs);
      });
    }

    function renderMessages(msgs){
      messagesList.innerHTML = '';
      msgs.forEach(msg => {
        const isOwn = currentUser && msg.name === currentUser.name;
        const div = document.createElement('div');
        div.className = `message ${isOwn? 'own':''}`;
        let content = `<div class="msg-header">${msg.name}</div>`;
        if(msg.text) content += `<div>${msg.text}</div>`;
        if(msg.image) content += `<div><img src="${msg.image}" style="max-width:200px; border-radius:8px;" /></div>`;
        if(msg.voice) content += `<div><audio controls src="${msg.voice}"></audio></div>`;
        div.innerHTML = content;
        messagesList.appendChild(div);
      });
      messagesList.scrollTop = messagesList.scrollHeight;
    }
  </script>
</body>
</html>
