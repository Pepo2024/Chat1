<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم بوت تليجرام</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #0088cc; }
        input, textarea, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background-color: #0088cc; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #006699; }
        #chat-box { height: 300px; border: 1px solid #eee; overflow-y: auto; padding: 10px; background: #fafafa; border-radius: 8px; display: flex; flex-direction: column; }
        .msg { margin: 5px; padding: 10px; border-radius: 10px; max-width: 80%; }
        .sent { align-self: flex-end; background-color: #dcf8c6; color: black; }
        .received { align-self: flex-start; background-color: #fff; border: 1px solid #ddd; }
        .status { font-size: 12px; text-align: center; color: gray; }
    </style>
</head>
<body>

<div class="container">
    <h2>Telegram Bot Messenger</h2>
    
    <input type="text" id="botToken" placeholder="أدخل توكن البوت (Bot Token)">
    <input type="text" id="chatId" placeholder="أدخل ID الشخص (Chat ID)">
    
    <button onclick="startPolling()" id="pollBtn">بدء استقبال الرسائل</button>
    <p class="status" id="status">الحالة: متوقف</p>

    <div id="chat-box">
        </div>

    <textarea id="messageText" placeholder="اكتب رسالتك هنا..." rows="3"></textarea>
    <button onclick="sendMessage()" style="background-color: #25d366;">إرسال الرسالة</button>
</div>

<script>
    let lastUpdateId = 0;
    let pollingInterval;

    // دالة إرسال الرسائل
    async function sendMessage() {
        const token = document.getElementById('botToken').value;
        const chatId = document.getElementById('chatId').value;
        const text = document.getElementById('messageText').value;

        if (!token || !chatId || !text) {
            alert("من فضلك املأ كل الخانات");
            return;
        }

        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.ok) {
                appendMessage(text, 'sent');
                document.getElementById('messageText').value = '';
            } else {
                alert("خطأ في الإرسال: " + data.description);
            }
        } catch (error) {
            console.error("Error:", error);
        }
    }

    // دالة استقبال الرسائل (Polling)
    async function startPolling() {
        const token = document.getElementById('botToken').value;
        if (!token) {
            alert("دخل التوكن الأول عشان أقدر أسمع الرسائل");
            return;
        }

        document.getElementById('status').innerText = "الحالة: جاري الاستقبال...";
        document.getElementById('pollBtn').disabled = true;

        // تكرار العملية كل 3 ثواني
        pollingInterval = setInterval(async () => {
            const url = `https://api.telegram.org/bot${token}/getUpdates?offset=${lastUpdateId + 1}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.ok && data.result.length > 0) {
                    data.result.forEach(update => {
                        lastUpdateId = update.update_id;
                        if (update.message && update.message.text) {
                            // بنعرض الرسالة بس لو جاية من الـ ID اللي حددناه
                            const incomingChatId = update.message.chat.id.toString();
                            const targetChatId = document.getElementById('chatId').value;
                            
                            if (incomingChatId === targetChatId) {
                                appendMessage(update.message.text, 'received');
                            }
                        }
                    });
                }
            } catch (error) {
                console.error("Polling Error:", error);
            }
        }, 3000);
    }

    // إضافة الرسالة للشاشة
    function appendMessage(text, type) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${type}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight; // سكرول لآخر رسالة
    }
</script>

</body>
</html>
